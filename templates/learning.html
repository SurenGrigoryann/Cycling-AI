<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Learning — Bin Buddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --accent: #c8ff00;
      --text: #f5f5f5;
      --muted: #666;
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.12);
      --red: #ff3b30;
      --green: #4caf50;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
    }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: max(env(safe-area-inset-top), 16px) 20px 14px;
      z-index: 10;
      display: flex;
      align-items: center;
      background: rgba(8,8,8,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
    }
    .app-name {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .page-content {
      padding-top: 80px;
      padding-bottom: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 11;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 max(env(safe-area-inset-bottom), 12px);
      background: rgba(8,8,8,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--glass-border);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 20px;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-item.active { color: var(--accent); }
    .nav-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="app-name">Learning</div>
  </div>

  <div class="page-content">
    <!-- content coming soon -->
  </div>

  <nav class="bottom-nav">
    <a href="/learning" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span class="nav-label">Learning</span>
    </a>
    <a href="/" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span class="nav-label">Camera</span>
    </a>
    <a href="#" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <span class="nav-label">Practice</span>
    </a>
    <a href="#" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
      </svg>
      <span class="nav-label">Game</span>
    </a>
  </nav>

</body>
</html>
