<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
 <title>Learning — Bin Buddy</title>
 <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
 <style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

 :root {
 --bg: #080808; --accent: #c8ff00; --text: #f5f5f5;
 --muted: #444; --glass: rgba(255,255,255,0.05);
 --glass-border: rgba(255,255,255,0.1);
 }

 html, body {
 width: 100%; height: 100%;
 background: var(--bg);
 font-family: 'Syne', sans-serif;
 color: var(--text);
 overflow: hidden;
 }

 /* TOP BAR */
 .topbar {
 position: fixed; top: 0; left: 0; right: 0;
 padding: max(env(safe-area-inset-top), 16px) 20px 14px;
 z-index: 20; display: flex; align-items: center;
 justify-content: space-between;
 background: rgba(8,8,8,0.92);
 backdrop-filter: blur(12px);
 border-bottom: 1px solid var(--glass-border);
 }
 .app-name { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
 .progress-label { font-family: 'Syne Mono', monospace; font-size: 0.58rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }

 /* SCROLL */
 .scroll-wrap {
 position: fixed; top: 58px; bottom: 62px;
 left: 0; right: 0;
 overflow-y: scroll; scrollbar-width: none;
 }
 .scroll-wrap::-webkit-scrollbar { display: none; }

 /* SPINE */
 .spine {
 position: fixed; top: 58px; bottom: 62px;
 left: 50%; width: 2px;
 transform: translateX(-50%);
 pointer-events: none; z-index: 1;
 background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.05) 8%, rgba(255,255,255,0.05) 92%, transparent 100%);
 }

 /* BUILDING COLUMNS */
 .building-frame {
 position: fixed; top: 58px; bottom: 62px;
 left: 16px; right: 16px;
 pointer-events: none; z-index: 1;
 }
 .building-frame::before, .building-frame::after {
 content: ''; position: absolute; top: 0; bottom: 0; width: 1.5px;
 background: linear-gradient(to bottom, transparent 0%, rgba(255,255,255,0.07) 8%, rgba(255,255,255,0.07) 92%, transparent 100%);
 }
 .building-frame::before { left: 0; }
 .building-frame::after { right: 0; }

 /* BUILDING */
 .building { display: flex; flex-direction: column; align-items: center; padding: 32px 24px 32px; }

 /* ROOFTOP */
 .rooftop { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px 0 8px; margin-bottom: 4px; }
 .roof-cap { width: 48px; height: 3px; background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent); border-radius: 2px; }
 .roof-tag { font-family: 'Syne Mono', monospace; font-size: 0.48rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

 /* FLOOR CARD */
 .floor { width: 100%; max-width: 340px; position: relative; z-index: 2; }
 .lesson-card {
 border-radius: 20px; border: 1.5px solid var(--glass-border);
 background: var(--glass); padding: 22px 20px;
 display: flex; align-items: center; gap: 16px;
 transition: border-color 0.3s, background 0.3s;
 }
 .lesson-icon-wrap { width: 68px; height: 68px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; flex-shrink: 0; }
 .lesson-info { flex: 1; min-width: 0; }
 .lesson-num { font-family: 'Syne Mono', monospace; font-size: 0.52rem; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 3px; }
 .lesson-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
 .lesson-desc { font-family: 'Syne Mono', monospace; font-size: 0.58rem; color: var(--muted); line-height: 1.4; }
 .lesson-action { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }

 /* LOCKED */
 .floor.locked .lesson-card { opacity: 0.38; }
 .floor.locked .lesson-num { color: var(--muted); }

 /* CURRENT */
 .floor.current .lesson-card { border-color: rgba(200,255,0,0.5); background: rgba(200,255,0,0.04); }
 .floor.current .lesson-num { color: var(--accent); }

 /* COMPLETED */
 .floor.completed .lesson-card { border-color: rgba(76,175,80,0.4); background: rgba(76,175,80,0.05); }
 .floor.completed .lesson-num { color: #4caf50; }

 .start-btn {
 width: 38px; height: 38px; border-radius: 50%; border: none;
 background: var(--accent); color: #080808;
 display: flex; align-items: center; justify-content: center;
 cursor: pointer; animation: pulse-btn 2.2s ease infinite; flex-shrink: 0;
 }
 .start-btn:active { transform: scale(0.9); }
 @keyframes pulse-btn {
 0%, 100% { box-shadow: 0 0 0 0 rgba(200,255,0,0.5); }
 50% { box-shadow: 0 0 0 8px rgba(200,255,0,0); }
 }
 .lock-circle {
 width: 38px; height: 38px; border-radius: 50%;
 border: 1px solid rgba(255,255,255,0.08);
 background: rgba(255,255,255,0.03);
 display: flex; align-items: center; justify-content: center; color: var(--muted);
 }
 .done-circle {
 width: 38px; height: 38px; border-radius: 50%;
 background: rgba(76,175,80,0.15); border: 1px solid rgba(76,175,80,0.3);
 display: flex; align-items: center; justify-content: center; color: #4caf50;
 }

 /* CONNECTOR */
 .connector { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 10px 0; position: relative; z-index: 2; }
 .conn-node { width: 7px; height: 7px; border-radius: 2px; transform: rotate(45deg); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); transition: background 0.3s, border-color 0.3s; }
 .conn-node.sm { width: 5px; height: 5px; opacity: 0.5; }
 .conn-arrow { display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.15); }
 .connector.done .conn-node { background: rgba(76,175,80,0.3); border-color: rgba(76,175,80,0.4); }
 .connector.done .conn-arrow { color: rgba(76,175,80,0.4); }
 .connector.active .conn-node { background: rgba(200,255,0,0.25); border-color: rgba(200,255,0,0.4); }
 .connector.active .conn-arrow { color: rgba(200,255,0,0.4); }

 /* BOTTOM NAV */
 .bottom-nav {
 position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
 display: flex; justify-content: space-around; align-items: center;
 padding: 10px 0 max(env(safe-area-inset-bottom), 12px);
 background: rgba(8,8,8,0.92); backdrop-filter: blur(16px);
 border-top: 1px solid var(--glass-border);
 }
 .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 20px; color: var(--muted); text-decoration: none; }
 .nav-item.active { color: var(--accent); }
 .nav-label { font-family: 'Syne Mono', monospace; font-size: 0.52rem; letter-spacing: 0.1em; text-transform: uppercase; }
 </style>
</head>
<body>

 <div class="topbar">
 <div class="app-name">Learning</div>
 <div class="progress-label" id="progressLabel">0 / 3 complete</div>
 </div>

 <div class="building-frame"></div>
 <div class="spine"></div>

 <div class="scroll-wrap" id="scrollWrap">
 <div class="building">

 <!-- Rooftop -->
 <div class="rooftop">
 <div class="roof-cap"></div>
 <div class="roof-tag">Rooftop</div>
 </div>

 <!-- connector -->
 <div class="connector" id="conn3">
 <div class="conn-node sm"></div><div class="conn-node"></div>
 <div class="conn-arrow"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5,3 8,7"/></svg></div>
 <div class="conn-node"></div><div class="conn-node sm"></div>
 </div>

 <!-- Floor 3 -->
 <div class="floor locked" data-floor="3">
 <div class="lesson-card">
 <div class="lesson-icon-wrap" style="background:rgba(255,235,59,0.1);">🟡</div>
 <div class="lesson-info">
 <div class="lesson-num">Lesson 3</div>
 <div class="lesson-title">Paper & Cardboard</div>
 <div class="lesson-desc">Newspapers, boxes & bags</div>
 </div>
 <div class="lesson-action">
 <div class="lock-circle">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
 </div>
 </div>
 </div>
 </div>

 <!-- connector -->
 <div class="connector" id="conn2">
 <div class="conn-node sm"></div><div class="conn-node"></div>
 <div class="conn-arrow"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5,3 8,7"/></svg></div>
 <div class="conn-node"></div><div class="conn-node sm"></div>
 </div>

 <!-- Floor 2 -->
 <div class="floor locked" data-floor="2">
 <div class="lesson-card">
 <div class="lesson-icon-wrap" style="background:rgba(79,195,247,0.1);">🔵</div>
 <div class="lesson-info">
 <div class="lesson-num">Lesson 2</div>
 <div class="lesson-title">Plastics & Bottles</div>
 <div class="lesson-desc">Bottles, containers & packaging</div>
 </div>
 <div class="lesson-action">
 <div class="lock-circle">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
 </div>
 </div>
 </div>
 </div>

 <!-- connector — active below floor 1 -->
 <div class="connector active" id="conn1">
 <div class="conn-node sm"></div><div class="conn-node"></div>
 <div class="conn-arrow"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5,3 8,7"/></svg></div>
 <div class="conn-node"></div><div class="conn-node sm"></div>
 </div>

 <!-- Floor 1 — always current/available -->
 <div class="floor current" data-floor="1">
 <div class="lesson-card">
 <div class="lesson-icon-wrap" style="background:rgba(129,199,132,0.15);">🌱</div>
 <div class="lesson-info">
 <div class="lesson-num">Lesson 1</div>
 <div class="lesson-title">Food & Organics</div>
 <div class="lesson-desc">Fruit scraps, leftovers & compost</div>
 </div>
 <div class="lesson-action" id="action1">
 <button class="start-btn" onclick="window.location='/lesson/1'">
 <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
 </button>
 </div>
 </div>
 </div>

 <div style="height: 20px;"></div>
 </div>
 </div>

 <!-- Bottom nav -->
 <nav class="bottom-nav">
 <a href="/learning" class="nav-item active" style="text-decoration:none;">
 <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
 <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
 <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
 </svg>
 <span class="nav-label">Learning</span>
 </a>
 <a href="/" class="nav-item" style="text-decoration:none;">
 <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
 <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
 <circle cx="12" cy="13" r="4"/>
 </svg>
 <span class="nav-label">Camera</span>
 </a>
 <a href="/practice" class="nav-item" style="text-decoration:none;">
 <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
 <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
 </svg>
 <span class="nav-label">Practice</span>
 </a>
 <a href="/game" class="nav-item" style="text-decoration:none;">
 <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
 <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
 <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
 <path d="M4 22h16"/>
 <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
 <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
 <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
 </svg>
 <span class="nav-label">Game</span>
 </a>
 </nav>

 <script>
 window.addEventListener('load', () => {
 const sw = document.getElementById('scrollWrap');
 sw.scrollTop = sw.scrollHeight;

 const playBtn = `<button class="start-btn" onclick="window.location='/lesson/ROUTE'"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></button>`;
 const doneBtn = (route) => `<button class="start-btn" style="background:rgba(76,175,80,0.3);border:1px solid rgba(76,175,80,0.5);" onclick="window.location='/lesson/${route}'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg></button>`;

 let completed = 0;

 if (localStorage.getItem('lesson_1_complete')) {
 completed++;
 const f1 = document.querySelector('[data-floor="1"]');
 f1.classList.remove('current'); f1.classList.add('completed');
 document.getElementById('action1').innerHTML = doneBtn(1);
 document.getElementById('conn1').classList.remove('active'); document.getElementById('conn1').classList.add('done');

 const f2 = document.querySelector('[data-floor="2"]');
 f2.classList.remove('locked'); f2.classList.add('current');
 f2.querySelector('.lesson-action').innerHTML = playBtn.replace('ROUTE', '2');
 f2.querySelector('.lesson-num').style.color = 'var(--accent)';
 document.getElementById('conn2').classList.add('active');
 }

 if (localStorage.getItem('lesson_2_complete')) {
 completed++;
 const f2 = document.querySelector('[data-floor="2"]');
 f2.classList.remove('current'); f2.classList.add('completed');
 f2.querySelector('.lesson-action').innerHTML = doneBtn(2);
 f2.querySelector('.lesson-num').style.color = '#4caf50';
 document.getElementById('conn2').classList.remove('active'); document.getElementById('conn2').classList.add('done');

 const f3 = document.querySelector('[data-floor="3"]');
 f3.classList.remove('locked'); f3.classList.add('current');
 f3.querySelector('.lesson-action').innerHTML = playBtn.replace('ROUTE', '3');
 f3.querySelector('.lesson-num').style.color = 'var(--accent)';
 document.getElementById('conn3').classList.add('active');
 }

 if (localStorage.getItem('lesson_3_complete')) {
 completed++;
 const f3 = document.querySelector('[data-floor="3"]');
 f3.classList.remove('current'); f3.classList.add('completed');
 f3.querySelector('.lesson-action').innerHTML = doneBtn(3);
 f3.querySelector('.lesson-num').style.color = '#4caf50';
 document.getElementById('conn3').classList.remove('active'); document.getElementById('conn3').classList.add('done');
 }

 document.getElementById('progressLabel').textContent = `${completed} / 3 complete`;
 });
 </script>

</body>
</html>
