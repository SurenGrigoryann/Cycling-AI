<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Bin Buddy — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --accent: #c8ff00;
      --text: #f5f5f5;
      --muted: #555;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.1);
      --red: #ff3b30;
      --green: #4caf50;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
    }

    /* ── CANVAS BACKGROUND ── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 1;
    }

    /* ── GRAIN OVERLAY ── */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.7;
    }

    /* ── SCANLINES ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.12) 3px,
        rgba(0,0,0,0.12) 4px
      );
    }

    /* ── PAGE LAYOUT ── */
    .page {
      position: relative; z-index: 2;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 44px;
      opacity: 0;
      transform: translateY(-20px);
      animation: slideDown 0.7s cubic-bezier(0.34, 1.4, 0.64, 1) 0.1s forwards;
    }

    .logo-icon-wrap {
      position: relative;
      margin-bottom: 16px;
    }

    .logo-icon {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 0 0 rgba(200,255,0,0.4);
      animation: pulse-ring 2.5s ease-out 1s infinite;
    }

    .logo-ring {
      position: absolute;
      inset: -10px;
      border-radius: 28px;
      border: 2px solid rgba(200,255,0,0.6);
      animation: ring-expand 2s ease-out 1s infinite;
    }
    .logo-ring-2 {
      position: absolute;
      inset: -22px;
      border-radius: 38px;
      border: 1.5px solid rgba(200,255,0,0.35);
      animation: ring-expand 2s ease-out 1.3s infinite;
    }

    @keyframes ring-expand {
      0% { opacity: 1; transform: scale(0.92); }
      100% { opacity: 0; transform: scale(1.35); }
    }
    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,255,0,0.5); }
      50% { box-shadow: 0 0 40px 10px rgba(200,255,0,0.3); }
    }

    .logo-name {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .logo-tagline {
      font-family: 'Syne Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.28em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 360px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 28px 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      transform: translateY(24px);
      animation: slideUp 0.7s cubic-bezier(0.34, 1.3, 0.64, 1) 0.25s forwards;
      position: relative;
      overflow: hidden;
    }

    /* Card inner glow */
    .card::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 280px; height: 160px;
      background: radial-gradient(ellipse, rgba(200,255,0,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 3px;
      margin-bottom: 22px;
      position: relative;
    }

    .tab-slider {
      position: absolute;
      top: 3px; bottom: 3px;
      width: calc(50% - 3px);
      background: var(--accent);
      border-radius: 9px;
      transition: transform 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
      left: 3px;
    }
    .tabs.on-register .tab-slider {
      transform: translateX(calc(100% + 0px));
    }

    .tab-btn {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 9px;
      background: transparent;
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition: color 0.25s;
      color: var(--muted);
    }
    .tab-btn.active { color: #000; font-weight: 700; }

    /* ── INPUTS ── */
    .fields { display: flex; flex-direction: column; gap: 10px; }

    .field-wrap {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1),
                  opacity 0.3s ease,
                  margin-bottom 0.3s ease;
    }
    .field-wrap.show {
      max-height: 56px;
      opacity: 1;
    }

    .input-group {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .auth-input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }
    .auth-input::placeholder { color: var(--muted); font-size: 0.82rem; }
    .auth-input:focus {
      border-color: rgba(200,255,0,0.9);
      background: rgba(200,255,0,0.06);
      box-shadow: 0 0 0 3px rgba(200,255,0,0.18), 0 0 20px rgba(200,255,0,0.12);
    }
    .auth-input:focus + .input-icon,
    .input-group:focus-within .input-icon { color: var(--accent); }

    /* ── MESSAGE ── */
    .auth-message {
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-align: center;
      min-height: 16px;
      margin: 6px 0 2px;
      transition: all 0.3s;
      opacity: 0;
    }
    .auth-message.show { opacity: 1; }
    .auth-message.error { color: var(--red); }
    .auth-message.success { color: var(--green); }

    /* ── SUBMIT BUTTON ── */
    .auth-submit {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
    }
    .auth-submit:hover {
      box-shadow: 0 4px 24px rgba(200,255,0,0.3);
      transform: translateY(-1px);
    }
    .auth-submit:active { transform: scale(0.97) translateY(0); }
    .auth-submit:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    /* Shimmer sweep on button */
    .auth-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.35) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0s;
    }
    .auth-submit:not(:disabled):hover::after {
      transform: translateX(100%);
      transition: transform 0.5s ease;
    }

    .btn-content {
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .auth-submit.loading .btn-label { display: none; }
    .auth-submit.loading .btn-spinner { display: block; }

    /* ── FLOATING PARTICLES ── */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: float-up linear infinite;
      opacity: 0;
    }

    @keyframes float-up {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-100vh) translateX(var(--dx)) rotate(360deg); opacity: 0; }
    }

    /* ── KEYFRAMES ── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes glitch-1 {
      0%, 95%, 100% { clip-path: none; transform: none; }
      96% { clip-path: inset(20% 0 60% 0); transform: translateX(-4px); }
      97% { clip-path: inset(60% 0 10% 0); transform: translateX(4px); }
      98% { clip-path: inset(40% 0 40% 0); transform: translateX(-2px); }
    }

    /* Logo glitch effect */
    .logo-name {
      position: relative;
      animation: glitch-1 6s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <canvas id="bgCanvas"></canvas>
  <div class="grain"></div>
  <div class="scanlines"></div>

  <div class="page">
    <div class="logo-wrap">
      <div class="logo-icon-wrap">
        <div class="logo-ring"></div>
        <div class="logo-ring-2"></div>
        <div class="logo-icon">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4v5h5"/>
            <path d="M20 20v-5h-5"/>
            <path d="M4 9a9 9 0 0114.93-2.69M20 15A9 9 0 015.07 17.69"/>
          </svg>
        </div>
      </div>
      <div class="logo-name">Bin Buddy</div>
      <div class="logo-tagline">Sort smarter, not harder</div>
    </div>

    <div class="card">
      <div class="tabs" id="tabsEl">
        <div class="tab-slider" id="tabSlider"></div>
        <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" id="registerTab" onclick="switchTab('register')">Register</button>
      </div>

      <div class="fields">
        <div class="field-wrap" id="emailWrap">
          <div class="input-group">
            <input class="auth-input" id="emailInput" type="email" placeholder="Email" autocomplete="email"/>
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>

        <div class="input-group">
          <input class="auth-input" id="usernameInput" type="text" placeholder="Username" autocomplete="username"/>
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </div>

        <div class="input-group">
          <input class="auth-input" id="passwordInput" type="password" placeholder="Password" autocomplete="current-password"/>
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </div>

      <div class="auth-message" id="authMessage"></div>

      <button class="auth-submit" id="authSubmit" onclick="handleAuth()">
        <div class="btn-content">
          <span class="btn-label">Login</span>
          <div class="btn-spinner"></div>
        </div>
      </button>
    </div>
  </div>

  <script>
    // ── Skip to app if already logged in ──
    if (localStorage.getItem('bb_token')) window.location.href = '/';

    // ── Original animated grid background ──
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, nodes = [], time = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      initNodes();
    }
    window.addEventListener('resize', resize);

    function initNodes() {
      nodes = [];
      const cols = 10, rows = 16;
      for (let r = 0; r <= rows; r++) {
        for (let c = 0; c <= cols; c++) {
          nodes.push({
            bx: (c / cols) * W,
            by: (r / rows) * H,
            phase: Math.random() * Math.PI * 2,
            speed: 0.3 + Math.random() * 0.4,
            amp: 6 + Math.random() * 10
          });
        }
      }
    }

    function getPos(n, t) {
      return {
        x: n.bx + Math.sin(t * n.speed + n.phase) * n.amp,
        y: n.by + Math.cos(t * n.speed * 0.7 + n.phase) * n.amp * 0.6
      };
    }

    function drawBg(t) {
      ctx.clearRect(0, 0, W, H);
      const cols = 10;

      nodes.forEach((n, i) => {
        const col = i % (cols + 1);
        const row = Math.floor(i / (cols + 1));
        const p = getPos(n, t);

        if (col < cols) {
          const r = getPos(nodes[i + 1], t);
          const dist = Math.hypot(r.x - p.x, r.y - p.y);
          const alpha = Math.max(0, 0.22 - dist / 1200);
          ctx.strokeStyle = `rgba(200,255,0,${alpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(r.x, r.y); ctx.stroke();
        }

        if (row < Math.floor(nodes.length / (cols + 1)) - 1) {
          const d = getPos(nodes[i + (cols + 1)], t);
          const dist = Math.hypot(d.x - p.x, d.y - p.y);
          const alpha = Math.max(0, 0.22 - dist / 1200);
          ctx.strokeStyle = `rgba(200,255,0,${alpha})`;
          ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(d.x, d.y); ctx.stroke();
        }

        const glow = (Math.sin(t * n.speed + n.phase) + 1) / 2;
        const dotR = 1.5 + glow * 2.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,255,0,${0.3 + glow * 0.55})`;
        ctx.fill();
        const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, dotR * 5);
        grad.addColorStop(0, `rgba(200,255,0,${0.12 + glow * 0.15})`);
        grad.addColorStop(1, 'rgba(200,255,0,0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, dotR * 5, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
      });

      const vg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
      vg.addColorStop(0, 'rgba(8,8,8,0)');
      vg.addColorStop(0.6, 'rgba(8,8,8,0.2)');
      vg.addColorStop(1, 'rgba(8,8,8,0.65)');
      ctx.fillStyle = vg;
      ctx.fillRect(0, 0, W, H);
    }

    resize();

    function loop() {
      time += 0.008;
      drawBg(time);
      requestAnimationFrame(loop);
    }
    loop();

    // ── Floating orbs (small) ──
    function spawnParticle() {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = 4 + Math.random() * 10;
      const x = Math.random() * 100;
      const dx = (Math.random() - 0.5) * 90;
      const dur = 6 + Math.random() * 8;
      const delay = Math.random() * 2;
      const opacity = 0.5 + Math.random() * 0.4;
      p.style.cssText = `
        width:${size}px; height:${size}px;
        left:${x}vw; bottom:-20px;
        background: rgba(200,255,0,${opacity});
        --dx: ${dx}px;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        box-shadow: 0 0 ${size * 3}px ${size}px rgba(200,255,0,${opacity * 0.5});
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), (dur + delay) * 1000);
    }

    for (let i = 0; i < 16; i++) spawnParticle();
    setInterval(spawnParticle, 800);

    // ── Floating recycling icons ──
    const recyclingIcons = [
      // Recycling arrows
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h5"/><path d="M20 20v-5h-5"/><path d="M4 9a9 9 0 0114.93-2.69M20 15A9 9 0 015.07 17.69"/></svg>`,
      // Trash bin
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>`,
      // Leaf / organic
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22V12"/><path d="M12 12C12 7 7 4 3 6c0 5 4 8 9 6"/><path d="M12 12c0-5 5-8 9-6-1 5-5 8-9 6"/></svg>`,
      // Water bottle / container
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2h8"/><path d="M9 2v2.789a4 4 0 0 1-.672 2.219l-.656.984A4 4 0 0 0 7 10.212V20a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-9.789a4 4 0 0 0-.672-2.219l-.656-.984A4 4 0 0 1 15 4.788V2"/></svg>`,
      // Package/box
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
      // Globe / earth
      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
    ];

    function spawnIcon() {
      const wrap = document.createElement('div');
      const size = 18 + Math.random() * 22;
      const x = Math.random() * 90 + 5;
      const dx = (Math.random() - 0.5) * 80;
      const dur = 9 + Math.random() * 10;
      const delay = Math.random() * 3;
      const opacity = 0.08 + Math.random() * 0.13;
      const rotate = Math.random() * 360;
      const rotateEnd = rotate + (Math.random() - 0.5) * 180;
      const icon = recyclingIcons[Math.floor(Math.random() * recyclingIcons.length)];

      wrap.style.cssText = `
        position: fixed;
        width: ${size}px; height: ${size}px;
        left: ${x}vw; bottom: -${size + 10}px;
        color: rgba(200,255,0,${opacity});
        z-index: 1;
        pointer-events: none;
        animation: icon-float ${dur}s linear ${delay}s forwards;
        --dx: ${dx}px;
        --r0: ${rotate}deg;
        --r1: ${rotateEnd}deg;
      `;
      wrap.innerHTML = icon;
      document.body.appendChild(wrap);
      setTimeout(() => wrap.remove(), (dur + delay) * 1000);
    }

    // Add icon float keyframe dynamically
    const styleEl = document.createElement('style');
    styleEl.textContent = `
      @keyframes icon-float {
        0%   { transform: translateY(0) translateX(0) rotate(var(--r0)); opacity: 0; }
        8%   { opacity: 1; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(-105vh) translateX(var(--dx)) rotate(var(--r1)); opacity: 0; }
      }
    `;
    document.head.appendChild(styleEl);

    for (let i = 0; i < 8; i++) spawnIcon();
    setInterval(spawnIcon, 1800);

    // ── Auth logic ──
    let currentTab = 'login';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('loginTab').classList.toggle('active', tab === 'login');
      document.getElementById('registerTab').classList.toggle('active', tab === 'register');
      document.getElementById('tabsEl').classList.toggle('on-register', tab === 'register');
      document.querySelector('.btn-label').textContent = tab === 'login' ? 'Login' : 'Create Account';
      document.getElementById('emailWrap').classList.toggle('show', tab === 'register');
      clearMsg();
      document.getElementById('usernameInput').value = '';
      document.getElementById('passwordInput').value = '';
      document.getElementById('emailInput').value = '';
    }

    async function handleAuth() {
      const username = document.getElementById('usernameInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const email = document.getElementById('emailInput').value.trim();
      const btn = document.getElementById('authSubmit');

      if (!username || !password) { setMsg('Fill in all fields', 'error'); return; }
      if (currentTab === 'register' && !email) { setMsg('Email is required', 'error'); return; }

      btn.disabled = true;
      btn.classList.add('loading');
      clearMsg();

      try {
        const endpoint = currentTab === 'login' ? '/login' : '/register';
        const body = currentTab === 'login'
          ? { username, password }
          : { username, email, password };

        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();

        if (currentTab === 'register') {
          if (data.success) {
            setMsg('Account created — logging you in...', 'success');
            setTimeout(() => autoLogin(username, password), 900);
          } else {
            setMsg(data.message || 'Registration failed', 'error');
            btn.disabled = false; btn.classList.remove('loading');
          }
        } else {
          if (data.success && data.token) {
            localStorage.setItem('bb_token', data.token);
            setMsg('Welcome back!', 'success');
            setTimeout(() => window.location.href = '/', 700);
          } else {
            setMsg(data.message || 'Invalid credentials', 'error');
            btn.disabled = false; btn.classList.remove('loading');
            // Shake card
            const card = document.querySelector('.card');
            card.style.animation = 'none';
            card.style.transform = 'translateX(-8px)';
            setTimeout(() => { card.style.transform = 'translateX(8px)'; }, 80);
            setTimeout(() => { card.style.transform = 'translateX(-4px)'; }, 160);
            setTimeout(() => { card.style.transform = 'translateX(0)'; card.style.transition = 'transform 0.2s'; }, 240);
          }
        }
      } catch {
        setMsg('Connection error', 'error');
        btn.disabled = false; btn.classList.remove('loading');
      }
    }

    async function autoLogin(username, password) {
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success && data.token) {
          localStorage.setItem('bb_token', data.token);
          window.location.href = '/';
        } else { switchTab('login'); }
      } catch { switchTab('login'); }
    }

    function setMsg(msg, type) {
      const el = document.getElementById('authMessage');
      el.textContent = msg;
      el.className = `auth-message show ${type}`;
    }
    function clearMsg() {
      const el = document.getElementById('authMessage');
      el.textContent = '';
      el.className = 'auth-message';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleAuth(); });
  </script>
</body>
</html>
