<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Bin Buddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --accent: #c8ff00;
      --text: #f5f5f5;
      --muted: #666;
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.12);
      --red: #ff3b30;
      --green: #4caf50;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
    }

    /* VIDEO */
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      transform: scaleX(-1);
    }
    #video.frozen { display: none; }

    #snapshot {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      display: none;
    }
    #snapshot.visible { display: block; }

    /* OFF SCREEN */
    #offScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px;
      transition: opacity 0.4s;
    }
    #offScreen.hidden { opacity: 0; pointer-events: none; }
    .off-icon { opacity: 0.15; }
    .off-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* TOP BAR */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: max(env(safe-area-inset-top), 16px) 20px 14px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
    }
    .app-name {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .live-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .live-pill.show { opacity: 1; }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.4s ease infinite;
    }

    /* BOTTOM BAR */
    .bottombar {
      position: fixed;
      bottom: 60px; left: 0; right: 0;
      padding: 20px 40px 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%);
      transition: opacity 0.3s;
    }
    .bottombar.hidden { opacity: 0; pointer-events: none; }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 11;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 max(env(safe-area-inset-bottom), 12px);
      background: rgba(8,8,8,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--glass-border);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 20px;
      color: var(--muted);
    }
    .nav-item.active { color: var(--accent); }
    .nav-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.52rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .shutter {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.7);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease;
    }
    .shutter:active { transform: scale(0.92); }
    .shutter-fill {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: #fff;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .shutter.off { border-color: var(--accent); }
    .shutter.off .shutter-fill { background: var(--accent); width: 44px; height: 44px; border-radius: 12px; }
    .shutter:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ANALYZING OVERLAY */
    .analyzing {
      position: fixed; inset: 0;
      z-index: 9;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .analyzing.show { opacity: 1; pointer-events: all; }
    .analyzing-inner { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .spinner {
      width: 48px; height: 48px;
      border: 2px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .analyzing-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* UNCLEAR PANEL */
    .unclear-panel {
      position: fixed;
      bottom: 60px; left: 0; right: 0;
      z-index: 10;
      padding: 36px 24px max(env(safe-area-inset-bottom), 36px);
      background: linear-gradient(to top, rgba(0,0,0,0.97) 60%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
      text-align: center;
    }
    .unclear-panel.show { transform: translateY(0); }
    .unclear-icon {
      font-size: 2.8rem;
      margin-bottom: 12px;
    }
    .unclear-title {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }
    .unclear-subtitle {
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .retake-unclear-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text);
      font-family: 'Syne Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .retake-unclear-btn:active { opacity: 0.7; }

    /* GAME PANEL */
    .game-panel {
      position: fixed;
      bottom: 60px; left: 0; right: 0;
      z-index: 10;
      padding: 24px 20px max(env(safe-area-inset-bottom), 32px);
      background: linear-gradient(to top, rgba(0,0,0,0.97) 60%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .game-panel.show { transform: translateY(0); }

    .game-question {
      text-align: center;
      margin-bottom: 20px;
    }
    .game-question .which {
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .game-question .item-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    /* BIN CARDS */
    .bins-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .bin-card {
      flex: 1;
      max-width: 115px;
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-radius: 20px;
      padding: 18px 8px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .bin-card:active { transform: scale(0.94); }

    .bin-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .bin-card[data-bin="Garbage"] .bin-icon { background: rgba(150,150,150,0.15); color: #aaa; }
    .bin-card[data-bin="Recycling"] .bin-icon { background: rgba(79,195,247,0.15); color: #4fc3f7; }
    .bin-card[data-bin="Organic"] .bin-icon { background: rgba(129,199,132,0.15); color: #81c784; }

    .bin-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* Reveal states */
    .bin-card.correct {
      border-color: var(--green);
      background: rgba(76,175,80,0.18);
    }
    .bin-card.wrong-pick {
      border-color: var(--red);
      background: rgba(255,59,48,0.15);
    }
    .bin-card.dimmed {
      opacity: 0.3;
    }
    .bin-card.disabled { cursor: default; }

    /* Explanation */
    .explain-box {
      margin-top: 18px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.35s 0.15s;
      pointer-events: none;
    }
    .explain-box.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .verdict {
      font-size: 1.15rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }
    .verdict.correct { color: var(--green); }
    .verdict.wrong { color: var(--red); }
    .explain-text {
      font-size: 0.82rem;
      line-height: 1.55;
      color: rgba(245,245,245,0.8);
      text-align: center;
    }
    .try-again-btn {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text);
      font-family: 'Syne Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .try-again-btn:active { opacity: 0.7; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 180px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(255,59,48,0.9);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 20px;
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s;
      z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <img id="snapshot" alt="snapshot"/>
  <canvas id="canvas" style="display:none"></canvas>

  <!-- Off screen -->
  <div id="offScreen">
    <svg class="off-icon" width="64" height="64" fill="none" stroke="white" stroke-width="1.2" viewBox="0 0 24 24">
      <path d="M15 10l4.553-2.277A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
    </svg>
    <p class="off-label">Tap to start</p>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <div class="app-name">Bin Buddy</div>
    <div class="live-pill" id="livePill">
      <div class="live-dot"></div>
      Live
    </div>
  </div>

  <!-- Analyzing overlay -->
  <div class="analyzing" id="analyzingOverlay">
    <div class="analyzing-inner">
      <div class="spinner"></div>
      <div class="analyzing-label">Identifying...</div>
    </div>
  </div>

  <!-- Bottom bar (shutter) -->
  <div class="bottombar" id="bottomBar">
    <button class="shutter off" id="shutterBtn" onclick="handleShutter()">
      <div class="shutter-fill"></div>
    </button>
  </div>

  <!-- Game panel -->
  <div class="game-panel" id="gamePanel">
    <div class="game-question">
      <div class="which">Which bin for</div>
      <div class="item-name" id="itemName">—</div>
    </div>

    <div class="bins-row">
      <!-- Garbage -->
      <button class="bin-card" data-bin="Garbage" onclick="chooseBin('Garbage')">
        <div class="bin-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M9 6V4h6v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </div>
        <span class="bin-label">Garbage</span>
      </button>

      <!-- Recycling -->
      <button class="bin-card" data-bin="Recycling" onclick="chooseBin('Recycling')">
        <div class="bin-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4v5h5"/>
            <path d="M20 20v-5h-5"/>
            <path d="M4 9a9 9 0 0114.93-2.69M20 15A9 9 0 015.07 17.69"/>
          </svg>
        </div>
        <span class="bin-label">Recycling</span>
      </button>

      <!-- Organic -->
      <button class="bin-card" data-bin="Organic" onclick="chooseBin('Organic')">
        <div class="bin-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22V12"/>
            <path d="M12 12C12 7 7 4 3 6c0 5 4 8 9 6"/>
            <path d="M12 12c0-5 5-8 9-6-1 5-5 8-9 6"/>
          </svg>
        </div>
        <span class="bin-label">Organic</span>
      </button>
    </div>

    <!-- Reveal area -->
    <div class="explain-box" id="explainBox">
      <div class="verdict" id="verdict"></div>
      <div class="explain-text" id="explainText"></div>
      <button class="try-again-btn" onclick="retake()">Try another item</button>
    </div>
  </div>

  <!-- Unclear panel -->
  <div class="unclear-panel" id="unclearPanel">
    <div class="unclear-icon">🔍</div>
    <div class="unclear-title">Can't identify this</div>
    <div class="unclear-subtitle" id="unclearItem"></div>
    <button class="retake-unclear-btn" onclick="retake()">Try a clearer photo</button>
  </div>

  <!-- Bottom nav -->
  <nav class="bottom-nav">
    <a href="/learning" class="nav-item" style="text-decoration:none;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
      <span class="nav-label">Learning</span>
    </a>
    <div class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span class="nav-label">Camera</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/>
        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg>
      <span class="nav-label">Practice</span>
    </div>
    <div class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>
        <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/>
        <path d="M4 22h16"/>
        <path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/>
        <path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/>
        <path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/>
      </svg>
      <span class="nav-label">Game</span>
    </div>
  </nav>

  <div class="toast" id="toast"></div>
  <div><a href="/tutorial" class="nav-btn">?</a></div>

  <script>
    let stream = null;
    let state = 'off'; // off | live | frozen | choosing | revealed | unclear
    let correctBin = null;
    let explanationText = null;

    const video = document.getElementById('video');
    const snapshot = document.getElementById('snapshot');
    const canvas = document.getElementById('canvas');
    const offScreen = document.getElementById('offScreen');
    const shutterBtn = document.getElementById('shutterBtn');
    const livePill = document.getElementById('livePill');
    const bottomBar = document.getElementById('bottomBar');
    const analyzingOverlay = document.getElementById('analyzingOverlay');
    const gamePanel = document.getElementById('gamePanel');
    const unclearPanel = document.getElementById('unclearPanel');
    const unclearItem = document.getElementById('unclearItem');
    const itemName = document.getElementById('itemName');
    const explainBox = document.getElementById('explainBox');
    const verdict = document.getElementById('verdict');
    const explainText = document.getElementById('explainText');
    const toast = document.getElementById('toast');

    function handleShutter() {
      if (state === 'off') startCamera();
      else if (state === 'live') captureAndAnalyze();
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        video.srcObject = stream;
        offScreen.classList.add('hidden');
        livePill.classList.add('show');
        shutterBtn.classList.remove('off');
        state = 'live';
      } catch (err) {
        showToast('Camera access denied');
      }
    }

    async function captureAndAnalyze() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);
      ctx.restore();
      const imageData = canvas.toDataURL('image/jpeg', 0.85);

      snapshot.src = imageData;
      snapshot.classList.add('visible');
      video.classList.add('frozen');
      analyzingOverlay.classList.add('show');
      shutterBtn.disabled = true;
      livePill.classList.remove('show');
      bottomBar.classList.add('hidden');
      state = 'frozen';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: imageData })
        });
        const data = await res.json();

        if (data.error) {
          showToast(data.error);
          retake();
          return;
        }

        analyzingOverlay.classList.remove('show');

        if (data.confident === false) {
          unclearItem.textContent = data.item
            ? `Detected "${data.item}" but not confident enough to sort it.`
            : 'The image is too blurry or unclear to identify.';
          unclearPanel.classList.add('show');
          state = 'unclear';
          return;
        }

        correctBin = data.bin;
        explanationText = data.explanation;
        itemName.textContent = data.item;

        // Enable all bin cards
        document.querySelectorAll('.bin-card').forEach(card => {
          card.classList.remove('correct', 'wrong-pick', 'dimmed', 'disabled');
          card.onclick = () => chooseBin(card.dataset.bin);
        });
        explainBox.classList.remove('show');
        gamePanel.classList.add('show');
        state = 'choosing';
      } catch (err) {
        showToast(err.message || 'Something went wrong');
        retake();
      } finally {
        shutterBtn.disabled = false;
      }
    }

    function chooseBin(chosen) {
      if (state !== 'choosing') return;
      state = 'revealed';

      document.querySelectorAll('.bin-card').forEach(card => {
        const bin = card.dataset.bin;
        card.onclick = null;
        card.classList.add('disabled');
        if (bin === correctBin) {
          card.classList.add('correct');
        } else if (bin === chosen) {
          card.classList.add('wrong-pick');
        } else {
          card.classList.add('dimmed');
        }
      });

      const isCorrect = chosen === correctBin;
      verdict.textContent = isCorrect ? '✓ Correct!' : `✗ It's ${correctBin}`;
      verdict.className = 'verdict ' + (isCorrect ? 'correct' : 'wrong');
      explainText.textContent = explanationText;
      explainBox.classList.add('show');
    }

    function retake() {
      correctBin = null;
      explanationText = null;

      snapshot.classList.remove('visible');
      video.classList.remove('frozen');
      analyzingOverlay.classList.remove('show');
      gamePanel.classList.remove('show');
      unclearPanel.classList.remove('show');
      bottomBar.classList.remove('hidden');
      livePill.classList.add('show');
      shutterBtn.disabled = false;
      state = 'live';
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
