<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Bin Buddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --accent: #c8ff00;
      --text: #f5f5f5;
      --muted: #555;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.1);
      --red: #ff3b30;
      --green: #4caf50;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
    }

    /* ── VIDEO / SNAPSHOT ── */
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
      transform: scaleX(-1);
    }
    #video.frozen { display: none; }
    #snapshot {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0; display: none;
    }
    #snapshot.visible { display: block; }

    /* ── OFF SCREEN — redesigned hero ── */
    #offScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 5;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s;
      overflow: hidden;
    }
    #offScreen.hidden { opacity: 0; pointer-events: none; }

    /* Animated radial glow behind hero */
    .hero-glow {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,255,0,0.12) 0%, transparent 65%);
      top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      animation: glow-pulse 3.5s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -60%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -60%) scale(1.15); }
    }

    /* Orbiting ring */
    .hero-ring {
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      border: 1px solid rgba(200,255,0,0.15);
      top: 50%; left: 50%;
      transform: translate(-50%, -62%) rotate(0deg);
      animation: ring-spin 18s linear infinite;
    }
    .hero-ring-2 {
      position: absolute;
      width: 340px; height: 340px;
      border-radius: 50%;
      border: 1px dashed rgba(200,255,0,0.07);
      top: 50%; left: 50%;
      transform: translate(-50%, -62%) rotate(0deg);
      animation: ring-spin 32s linear infinite reverse;
    }
    @keyframes ring-spin { to { transform: translate(-50%, -62%) rotate(360deg); } }

    /* Dot on ring */
    .hero-ring::before {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      top: -4px; left: 50%; margin-left: -4px;
      box-shadow: 0 0 12px 4px rgba(200,255,0,0.6);
    }

    /* Central camera icon */
    .hero-icon-wrap {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
      margin-bottom: 20px;
    }

    .hero-camera-bg {
      width: 100px; height: 100px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(200,255,0,0.15) 0%, rgba(200,255,0,0.05) 100%);
      border: 1px solid rgba(200,255,0,0.3);
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 0 40px rgba(200,255,0,0.15), inset 0 1px 0 rgba(200,255,0,0.2);
      animation: icon-float 4s ease-in-out infinite;
    }
    @keyframes icon-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .hero-text {
      position: relative; z-index: 2;
      text-align: center;
      padding: 0 40px;
    }
    .hero-title {
      font-size: 3rem; font-weight: 800;
      letter-spacing: 0.03em;
      color: var(--text);
      line-height: 1.05;
      margin-bottom: 12px;
    }
    .hero-title span { color: var(--accent); }
    .hero-subtitle {
      font-family: 'Syne Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 36px;
    }

    /* Tap to start pill button */
    .hero-cta {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 28px;
      border-radius: 50px;
      background: var(--accent);
      border: none; cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 0.82rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: #000;
      box-shadow: 0 0 30px rgba(200,255,0,0.35);
      transition: transform 0.15s, box-shadow 0.2s;
      animation: cta-pulse 2.5s ease-in-out infinite;
      position: relative; z-index: 2;
    }
    .hero-cta:active { transform: scale(0.95); }
    @keyframes cta-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(200,255,0,0.3); }
      50% { box-shadow: 0 0 40px rgba(200,255,0,0.55); }
    }

    /* Floating bin badges */
    .float-badge {
      position: absolute;
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px;
      border-radius: 30px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      font-family: 'Syne Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 2;
      animation: badge-float 5s ease-in-out infinite;
    }
    .float-badge.b1 { top: 22%; left: 6%; animation-delay: 0s; color: #81c784; }
    .float-badge.b2 { top: 28%; right: 5%; animation-delay: 1.2s; color: #4fc3f7; }
    .float-badge.b3 { bottom: 28%; left: 8%; animation-delay: 0.6s; color: #aaa; }
    .float-badge .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .float-badge.b1 .badge-dot { background: #81c784; box-shadow: 0 0 6px #81c784; }
    .float-badge.b2 .badge-dot { background: #4fc3f7; box-shadow: 0 0 6px #4fc3f7; }
    .float-badge.b3 .badge-dot { background: #aaa; box-shadow: 0 0 6px #aaa; }
    @keyframes badge-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Grain overlay on off screen */
    .hero-grain {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      opacity: 0.6;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: max(env(safe-area-inset-top), 16px) 18px 14px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    }

    .app-name-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .app-name-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
    }
    .app-name {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .live-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0; transition: opacity 0.4s;
    }
    .live-pill.show { opacity: 1; }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: blink 1.4s ease infinite;
    }

    .topbar-btn {
      padding: 6px 13px;
      border-radius: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .topbar-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* ── SHUTTER / BOTTOMBAR ── */
    .bottombar {
      position: fixed;
      bottom: 72px; left: 0; right: 0;
      padding: 20px 40px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
      transition: opacity 0.3s;
    }
    .bottombar.hidden { opacity: 0; pointer-events: none; }

    .shutter {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.7);
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s ease;
      position: relative;
    }
    .shutter::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .shutter:active { transform: scale(0.92); }
    .shutter-fill {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: #fff;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .shutter.off { border-color: var(--accent); box-shadow: 0 0 20px rgba(200,255,0,0.3); }
    .shutter.off .shutter-fill { background: var(--accent); width: 44px; height: 44px; border-radius: 12px; }
    .shutter:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── BOTTOM NAV — redesigned ── */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 11;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 max(env(safe-area-inset-bottom), 12px);
      background: rgba(6,6,6,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .nav-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      padding: 4px 18px;
      color: var(--muted);
      text-decoration: none;
      position: relative;
      transition: color 0.2s;
    }
    .nav-item.active { color: var(--accent); }

    /* Active indicator dot */
    .nav-item.active::after {
      content: '';
      position: absolute;
      bottom: -10px; left: 50%; transform: translateX(-50%);
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* Nav icon container with subtle bg on active */
    .nav-icon-wrap {
      width: 40px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .nav-item.active .nav-icon-wrap {
      background: rgba(200,255,0,0.1);
    }

    .nav-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── ANALYZING ── */
    .analyzing {
      position: fixed; inset: 0; z-index: 9;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .analyzing.show { opacity: 1; pointer-events: all; }
    .analyzing-inner {
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px 40px;
      backdrop-filter: blur(20px);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(200,255,0,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .analyzing-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* ── UNCLEAR PANEL ── */
    .unclear-panel {
      position: fixed;
      bottom: 72px; left: 0; right: 0;
      z-index: 10;
      padding: 36px 24px max(env(safe-area-inset-bottom), 36px);
      background: linear-gradient(to top, rgba(0,0,0,0.97) 60%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
      text-align: center;
    }
    .unclear-panel.show { transform: translateY(0); }
    .unclear-icon { font-size: 2.8rem; margin-bottom: 12px; }
    .unclear-title { font-size: 1.1rem; font-weight: 800; color: var(--text); margin-bottom: 8px; }
    .unclear-subtitle {
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem; color: var(--muted);
      letter-spacing: 0.05em; line-height: 1.5; margin-bottom: 24px;
    }
    .retake-unclear-btn {
      width: 100%; padding: 14px;
      border-radius: 14px; border: 1px solid var(--glass-border);
      background: var(--glass); color: var(--text);
      font-family: 'Syne Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .retake-unclear-btn:active { opacity: 0.7; }

    /* ── GAME PANEL ── */
    .game-panel {
      position: fixed;
      bottom: 72px; left: 0; right: 0;
      z-index: 10;
      padding: 24px 20px max(env(safe-area-inset-bottom), 32px);
      background: linear-gradient(to top, rgba(0,0,0,0.97) 60%, transparent 100%);
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    .game-panel.show { transform: translateY(0); }
    .game-question { text-align: center; margin-bottom: 20px; }
    .game-question .which {
      font-family: 'Syne Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
    }
    .game-question .item-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }

    .bins-row { display: flex; gap: 10px; justify-content: center; }
    .bin-card {
      flex: 1; max-width: 115px;
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-radius: 20px;
      padding: 18px 8px 14px;
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .bin-card:active { transform: scale(0.94); }
    .bin-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .bin-card[data-bin="Garbage"] .bin-icon { background: rgba(150,150,150,0.15); color: #aaa; }
    .bin-card[data-bin="Recycling"] .bin-icon { background: rgba(79,195,247,0.15); color: #4fc3f7; }
    .bin-card[data-bin="Organic"] .bin-icon { background: rgba(129,199,132,0.15); color: #81c784; }
    .bin-label {
      font-family: 'Syne Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text);
    }
    .bin-card.correct { border-color: var(--green); background: rgba(76,175,80,0.18); }
    .bin-card.wrong-pick { border-color: var(--red); background: rgba(255,59,48,0.15); }
    .bin-card.dimmed { opacity: 0.3; }
    .bin-card.disabled { cursor: default; }

    .explain-box {
      margin-top: 18px;
      opacity: 0; transform: translateY(8px);
      transition: all 0.35s 0.15s;
      pointer-events: none;
    }
    .explain-box.show { opacity: 1; transform: translateY(0); pointer-events: all; }
    .verdict { font-size: 1.15rem; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .verdict.correct { color: var(--green); }
    .verdict.wrong { color: var(--red); }
    .explain-text { font-size: 0.82rem; line-height: 1.55; color: rgba(245,245,245,0.8); text-align: center; }
    .try-again-btn {
      margin-top: 16px; width: 100%;
      padding: 14px; border-radius: 14px;
      border: 1px solid var(--glass-border);
      background: var(--glass); color: var(--text);
      font-family: 'Syne Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase; cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .try-again-btn:active { opacity: 0.7; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 180px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(255,59,48,0.9);
      backdrop-filter: blur(10px);
      padding: 10px 20px; border-radius: 20px;
      font-family: 'Syne Mono', monospace;
      font-size: 0.72rem; letter-spacing: 0.1em;
      white-space: nowrap; opacity: 0;
      pointer-events: none; transition: all 0.3s; z-index: 20;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <img id="snapshot" alt="snapshot"/>
  <canvas id="canvas" style="display:none"></canvas>

  <!-- ── OFF SCREEN HERO ── -->
  <div id="offScreen">
    <div class="hero-grain"></div>
    <div class="hero-glow"></div>
    <div class="hero-ring"></div>
    <div class="hero-ring-2"></div>

    <!-- Floating bin badges -->
    <div class="float-badge b1">
      <div class="badge-dot"></div>
      Organic
    </div>
    <div class="float-badge b2">
      <div class="badge-dot"></div>
      Recycling
    </div>
    <div class="float-badge b3">
      <div class="badge-dot"></div>
      Garbage
    </div>

    <div class="hero-icon-wrap">
      <div class="hero-camera-bg">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#c8ff00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
    </div>

    <div class="hero-text">
      <div class="hero-title">Sort smarter<br/>with <span>AI</span></div>
      <div class="hero-subtitle">Point. Shoot. Know where it goes.</div>
    </div>
  </div>

  <!-- ── TOPBAR ── -->
  <div class="topbar">
    <div class="app-name-wrap">
      <div class="app-name-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v5h5"/><path d="M20 20v-5h-5"/>
          <path d="M4 9a9 9 0 0114.93-2.69M20 15A9 9 0 015.07 17.69"/>
        </svg>
      </div>
      <div class="app-name">Bin Buddy</div>
    </div>
    <div class="topbar-right">
      <div class="live-pill" id="livePill">
        <div class="live-dot"></div>
        Live
      </div>
      <a href="/tutorial" class="topbar-btn">?</a>
      <button class="topbar-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- ── ANALYZING OVERLAY ── -->
  <div class="analyzing" id="analyzingOverlay">
    <div class="analyzing-inner">
      <div class="spinner"></div>
      <div class="analyzing-label">Identifying...</div>
    </div>
  </div>

  <!-- ── SHUTTER ── -->
  <div class="bottombar" id="bottomBar">
    <button class="shutter off" id="shutterBtn" onclick="handleShutter()">
      <div class="shutter-fill"></div>
    </button>
  </div>

  <!-- ── GAME PANEL ── -->
  <div class="game-panel" id="gamePanel">
    <div class="game-question">
      <div class="which">Which bin for</div>
      <div class="item-name" id="itemName">—</div>
    </div>
    <div class="bins-row">
      <button class="bin-card" data-bin="Garbage" onclick="chooseBin('Garbage')">
        <div class="bin-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M9 6V4h6v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </div>
        <span class="bin-label">Garbage</span>
      </button>
      <button class="bin-card" data-bin="Recycling" onclick="chooseBin('Recycling')">
        <div class="bin-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4v5h5"/><path d="M20 20v-5h-5"/>
            <path d="M4 9a9 9 0 0114.93-2.69M20 15A9 9 0 015.07 17.69"/>
          </svg>
        </div>
        <span class="bin-label">Recycling</span>
      </button>
      <button class="bin-card" data-bin="Organic" onclick="chooseBin('Organic')">
        <div class="bin-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22V12"/>
            <path d="M12 12C12 7 7 4 3 6c0 5 4 8 9 6"/>
            <path d="M12 12c0-5 5-8 9-6-1 5-5 8-9 6"/>
          </svg>
        </div>
        <span class="bin-label">Organic</span>
      </button>
    </div>
    <div class="explain-box" id="explainBox">
      <div class="verdict" id="verdict"></div>
      <div class="explain-text" id="explainText"></div>
      <button class="try-again-btn" onclick="retake()">Try another item</button>
    </div>
  </div>

  <!-- ── UNCLEAR PANEL ── -->
  <div class="unclear-panel" id="unclearPanel">
    <div class="unclear-icon">🔍</div>
    <div class="unclear-title">Can't identify this</div>
    <div class="unclear-subtitle" id="unclearItem"></div>
    <button class="retake-unclear-btn" onclick="retake()">Try a clearer photo</button>
  </div>

  <!-- ── BOTTOM NAV ── -->
  <nav class="bottom-nav">
    <a href="/learning" class="nav-item" style="text-decoration:none;">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <span class="nav-label">Learning</span>
    </a>
    <div class="nav-item active">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <span class="nav-label">Camera</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">

      </div>
      <span class="nav-label">Practice</span>
    </div>
    <a href="/game" class="nav-item" style="text-decoration:none;">
      <div class="nav-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/>

        </svg>
      </div>
      <span class="nav-label">Game</span>
    </a>

  <div class="toast" id="toast"></div>

  <script>
    const authToken = localStorage.getItem('bb_token');
    if (!authToken) window.location.replace('/login');

    function logout() {
      localStorage.removeItem('bb_token');
      window.location.replace('/login');
    }

    let stream = null;
    let state = 'off';
    let correctBin = null;
    let explanationText = null;

    const video = document.getElementById('video');
    const snapshot = document.getElementById('snapshot');
    const canvas = document.getElementById('canvas');
    const offScreen = document.getElementById('offScreen');
    const shutterBtn = document.getElementById('shutterBtn');
    const livePill = document.getElementById('livePill');
    const bottomBar = document.getElementById('bottomBar');
    const analyzingOverlay = document.getElementById('analyzingOverlay');
    const gamePanel = document.getElementById('gamePanel');
    const unclearPanel = document.getElementById('unclearPanel');
    const unclearItem = document.getElementById('unclearItem');
    const itemName = document.getElementById('itemName');
    const explainBox = document.getElementById('explainBox');
    const verdict = document.getElementById('verdict');
    const explainText = document.getElementById('explainText');
    const toast = document.getElementById('toast');

    function handleShutter() {
      if (state === 'off') startCamera();
      else if (state === 'live') captureAndAnalyze();
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        video.srcObject = stream;
        offScreen.classList.add('hidden');
        livePill.classList.add('show');
        shutterBtn.classList.remove('off');
        state = 'live';
      } catch (err) {
        showToast('Camera access denied');
      }
    }

    async function captureAndAnalyze() {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d');
      ctx.save();
      ctx.translate(canvas.width, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0);
      ctx.restore();
      const imageData = canvas.toDataURL('image/jpeg', 0.85);

      snapshot.src = imageData;
      snapshot.classList.add('visible');
      video.classList.add('frozen');
      analyzingOverlay.classList.add('show');
      shutterBtn.disabled = true;
      livePill.classList.remove('show');
      bottomBar.classList.add('hidden');
      state = 'frozen';

      try {
        const res = await fetch('/analyze', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + authToken
          },
          body: JSON.stringify({ image: imageData })
        });

        if (res.status === 401) { logout(); return; }

        const data = await res.json();

        if (data.error) { showToast(data.error); retake(); return; }

        analyzingOverlay.classList.remove('show');

        if (data.confident === false) {
          unclearItem.textContent = data.item
            ? `Detected "${data.item}" but not confident enough to sort it.`
            : 'The image is too blurry or unclear to identify.';
          unclearPanel.classList.add('show');
          state = 'unclear';
          return;
        }

        correctBin = data.bin;
        explanationText = data.explanation;
        itemName.textContent = data.item;

        document.querySelectorAll('.bin-card').forEach(card => {
          card.classList.remove('correct', 'wrong-pick', 'dimmed', 'disabled');
          card.onclick = () => chooseBin(card.dataset.bin);
        });
        explainBox.classList.remove('show');
        gamePanel.classList.add('show');
        state = 'choosing';
      } catch (err) {
        showToast(err.message || 'Something went wrong');
        retake();
      } finally {
        shutterBtn.disabled = false;
      }
    }

    function chooseBin(chosen) {
      if (state !== 'choosing') return;
      state = 'revealed';

      document.querySelectorAll('.bin-card').forEach(card => {
        const bin = card.dataset.bin;
        card.onclick = null;
        card.classList.add('disabled');
        if (bin === correctBin) card.classList.add('correct');
        else if (bin === chosen) card.classList.add('wrong-pick');
        else card.classList.add('dimmed');
      });

      const isCorrect = chosen === correctBin;
      playBuddyAnimation(isCorrect ? 'happy' : 'sad', { loop: true });
      verdict.textContent = isCorrect ? '✓ Correct!' : `✗ It's ${correctBin}`;
      verdict.className = 'verdict ' + (isCorrect ? 'correct' : 'wrong');
      explainText.textContent = explanationText;
      explainBox.classList.add('show');
    }

    function retake() {
      dismissBuddyAnimation();
      correctBin = null;
      explanationText = null;
      snapshot.classList.remove('visible');
      video.classList.remove('frozen');
      analyzingOverlay.classList.remove('show');
      gamePanel.classList.remove('show');
      unclearPanel.classList.remove('show');
      bottomBar.classList.remove('hidden');
      livePill.classList.add('show');
      shutterBtn.disabled = false;
      state = 'live';
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
<script src="/static/buddy-animation.js"></script>
</body>
</html>
